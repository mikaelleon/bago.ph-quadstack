<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BAGO.PH - Announcements</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #eceff1; color: #1f2937; }
    .wrap { max-width: 980px; margin: 0 auto; padding: 24px; }
    .card { background: #fff; border-radius: 10px; padding: 16px; margin-bottom: 16px; box-shadow: 0 8px 24px rgba(0,0,0,.06); }
    form { display: grid; gap: 8px; }
    input, textarea, select, button { border: 1px solid #d1d5db; border-radius: 6px; padding: 8px 10px; font: inherit; }
    button { background: #0f766e; color: #fff; border: 0; cursor: pointer; }
    ul { list-style: none; margin: 0; padding: 0; display: grid; gap: 8px; }
    li { border: 1px solid #e5e7eb; border-radius: 8px; padding: 10px; background: #fafafa; }
    #admin-view { display: none; }
    #resident-view { display: none; }
    .inapp-card { border: 1px solid #e5e7eb; border-left: 4px solid #0f766e; border-radius: 8px; padding: 10px; background: #f9fffb; margin-bottom: 8px; }
  </style>
</head>
<body>
  <main class="wrap">
    <section id="admin-view">
      <div class="card">
        <h1>Publish Announcement</h1>
        <form id="announcement-form">
          <input id="ann-title" placeholder="Title" required maxlength="120" />
          <div id="ann-title-error"></div>
          <textarea id="ann-message" rows="4" placeholder="Message" required></textarea>
          <div id="ann-message-error"></div>
          <select id="ann-scope">
            <option value="all">All Barangays</option>
            <option value="resident">Residents</option>
            <option value="collector">Collectors</option>
            <option value="lgu_officer">LGU Officers</option>
          </select>
          <select id="ann-urgency">
            <option>General</option>
            <option>Urgent</option>
          </select>
          <button id="ann-submit-btn" type="submit">Publish</button>
        </form>
        <div id="ann-status"></div>
      </div>
      <div class="card">
        <h2>Announcement History</h2>
        <ul id="announcement-feed"></ul>
      </div>
    </section>

    <section id="resident-view">
      <div class="card">
        <h1>In-App Notifications</h1>
        <div id="inapp-feed"></div>
      </div>
    </section>
  </main>
  <script src="js/bago-env.js"></script>
  <script src="js/bago-api.js"></script>
  <script src="js/components/toast.js"></script>
  <script src="js/components/error-banner.js"></script>
  <script src="js/announcements-admin.js"></script>
  <script src="js/in-app-notifications.js"></script>
  <script>
    (async function () {
      var role = localStorage.getItem("bagoRole") || "user";
      var admin = document.getElementById("admin-view");
      var resident = document.getElementById("resident-view");
      if (role === "lgu_officer") {
        admin.style.display = "block";
        resident.style.display = "none";
        await window.BAGOAnnouncementsAdmin.initAnnouncementsAdmin();
      } else {
        admin.style.display = "none";
        resident.style.display = "block";
        await window.BAGOInAppNotifications.loadInAppFeed("inapp-feed", role);
      }
    })();
  </script>
</body>
</html>
