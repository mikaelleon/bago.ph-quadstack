<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BAGO.PH — Redirecting…</title>
  <script>
    (function () {
      var raw = localStorage.getItem("bagoRole");
      if (!raw) {
        window.location.replace("index.html");
        return;
      }
      function norm(r) {
        if (!r) return "user";
        var c = String(r).trim().toLowerCase().replace(/\s+/g, "_");
        if (c === "lgu_admin") return "lgu_officer";
        if (c === "user" || c === "collector" || c === "lgu_officer") return c;
        return "user";
      }
      var role = norm(raw);
      var map = {
        user: "dashboard-resident.html",
        collector: "dashboard-collector.html",
        lgu_officer: "dashboard-lgu.html"
      };
      window.location.replace(map[role] || "dashboard-resident.html");
    })();
  </script>
</head>
<body>
  <p style="font-family: system-ui, sans-serif; padding: 1rem;">Redirecting…</p>
</body>
</html>
