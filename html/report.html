<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BAGO.PH - Reports</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="anonymous" />
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f5f7fa; color: #1f2937; }
    .wrap { max-width: 1080px; margin: 0 auto; padding: 24px; }
    .card { background: #fff; border-radius: 10px; padding: 16px; margin-bottom: 16px; box-shadow: 0 8px 24px rgba(0,0,0,.06); }
    h1 { margin: 0 0 12px; }
    h2 { margin: 0 0 10px; font-size: 18px; }
    form { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    form textarea, form button, .muted { grid-column: span 2; }
    input, select, textarea, button { border: 1px solid #d1d5db; border-radius: 6px; padding: 8px 10px; font: inherit; }
    button { background: #0f766e; color: #fff; border: 0; cursor: pointer; }
    input:focus-visible, select:focus-visible, textarea:focus-visible, button:focus-visible, a:focus-visible { outline: 3px solid #0f766e; outline-offset: 2px; }
    #lgu-report-map { width: 100%; height: 420px; border-radius: 8px; }
    .status-steps { display: flex; gap: 8px; padding-left: 18px; flex-wrap: wrap; }
    .status-steps li { color: #6b7280; }
    .status-steps li.done { color: #15803d; font-weight: 700; }
    #lgu-view { display: none; }
    #lgu-report-list { max-height: 260px; overflow: auto; border: 1px solid #e5e7eb; border-radius: 8px; }
    .report-row { display: grid; grid-template-columns: 1fr auto; gap: 8px; padding: 10px; border-bottom: 1px solid #e5e7eb; }
    .report-row:last-child { border-bottom: 0; }
    .report-row button { padding: 6px 10px; font-size: 13px; }
    .status-controls { display: grid; grid-template-columns: 1fr auto; gap: 8px; margin-top: 8px; }
    .muted { color: #6b7280; font-size: 13px; }
    @media (max-width: 1024px) {
      .wrap { padding: 16px; }
      #lgu-report-map { height: 360px; }
    }
    @media (max-width: 768px) {
      form { grid-template-columns: 1fr; }
      form textarea, form button, .muted { grid-column: span 1; }
      .report-row { grid-template-columns: 1fr; }
      .report-row button { width: 100%; }
      #lgu-report-map { height: 300px; }
    }
    @media (max-width: 360px) {
      .wrap { padding: 12px; }
      h1 { font-size: 20px; }
      h2 { font-size: 16px; }
      #lgu-report-map { height: 240px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Waste Reports</h1>

    <section id="resident-view" aria-labelledby="resident-report-heading">
      <div class="card">
        <h2 id="resident-report-heading">Submit Report</h2>
        <form id="resident-report-form">
          <label for="report-issue">Issue type</label>
          <select id="report-issue" required aria-describedby="report-issue-error">
            <option>Missed Pickup</option>
            <option>Overflowing Bin</option>
            <option>Illegal Dumping</option>
            <option>Blocked Road</option>
            <option>Other</option>
          </select>
          <div id="report-issue-error" class="muted" aria-live="polite"></div>
          <label for="report-barangay">Barangay</label>
          <select id="report-barangay" required aria-describedby="report-barangay-error"></select>
          <div id="report-barangay-error" class="muted" aria-live="polite"></div>
          <label for="report-street">Street address</label>
          <input id="report-street" placeholder="Street address" required aria-describedby="report-street-error" />
          <div id="report-street-error" class="muted" aria-live="polite"></div>
          <label for="report-photo">Photo (optional)</label>
          <input id="report-photo" type="file" accept="image/*" capture="environment" aria-describedby="report-photo-error" />
          <div id="report-photo-error" class="muted" aria-live="polite"></div>
          <label for="report-description">Description (optional)</label>
          <textarea id="report-description" rows="4" placeholder="Describe issue (optional)" aria-describedby="report-geo-error"></textarea>
          <div id="report-geo-error" class="muted" aria-live="polite"></div>
          <button id="report-submit-btn" type="submit">Submit Report</button>
        </form>
        <div id="report-submit-status" role="status" aria-live="polite"></div>
      </div>
      <div class="card">
        <h2>Status Updates</h2>
        <div id="report-banner" role="region" aria-live="polite" aria-label="Report status updates"></div>
      </div>
      <div class="card">
        <h2>My Report Timeline</h2>
        <div id="resident-report-timeline"></div>
      </div>
    </section>

    <section id="lgu-view" aria-labelledby="lgu-report-heading">
      <div class="card">
        <h2 id="lgu-report-heading">LGU Report Map Overlay</h2>
        <p class="muted">Map shows report pin locations and status. Use report list below for full text details.</p>
        <div id="lgu-report-map" role="img" aria-label="Map of report locations"></div>
      </div>
      <div class="card">
        <h2>Update Report Status</h2>
        <div id="lgu-report-list" aria-live="polite"></div>
        <form id="lgu-report-status-form" style="margin-top:10px;">
          <label for="lgu-report-id">Report ID</label>
          <input id="lgu-report-id" placeholder="Report ID" required aria-describedby="lgu-report-id-error" />
          <div id="lgu-report-id-error" class="muted" aria-live="polite"></div>
          <label for="lgu-report-status">Status</label>
          <select id="lgu-report-status" required aria-describedby="lgu-report-status-error">
            <option value="Open">Open</option>
            <option value="Acknowledged">Acknowledged</option>
            <option value="In Progress">In Progress</option>
            <option value="Resolved">Resolved</option>
            <option value="Rejected">Rejected</option>
          </select>
          <div id="lgu-report-status-error" class="muted" aria-live="polite"></div>
          <button id="lgu-report-status-btn" type="submit">Apply Status</button>
        </form>
        <div id="lgu-report-status-message" class="muted" role="status" aria-live="polite"></div>
      </div>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin="anonymous"></script>
  <script src="js/bago-env.js"></script>
  <script src="js/bago-api.js"></script>
  <script src="role-access.js"></script>
  <script src="js/components/toast.js"></script>
  <script src="js/components/error-banner.js"></script>
  <script src="js/components/skeleton.js"></script>
  <script src="js/components/upload-progress.js"></script>
  <script src="js/components/in-app-banner.js"></script>
  <script src="js/lib/image-compress.js"></script>
  <script src="js/report-submit.js"></script>
  <script src="js/report-map.js"></script>
  <script src="js/report-detail.js"></script>
  <script>
    (async function () {
      var role = localStorage.getItem("bagoRole") || "user";
      var resident = document.getElementById("resident-view");
      var lgu = document.getElementById("lgu-view");
      if (role === "lgu_officer" || role === "collector") {
        resident.style.display = "none";
        lgu.style.display = "block";
        await window.BAGOReportMap.initLguReportTools();
      } else {
        resident.style.display = "block";
        lgu.style.display = "none";
        await window.BAGOReportSubmit.initResidentReportSubmit();
        await window.BAGOReportDetail.loadReportStatusBanners();
        await window.BAGOReportDetail.loadTimeline();
      }
    })();
  </script>
</body>
</html>
