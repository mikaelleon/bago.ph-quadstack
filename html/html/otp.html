<!doctype html>
<html lang="en">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>BAGO.PH - OTP</title><style>body{margin:0;min-height:100vh;background:#f0f2f5;}#app{width:100vw;min-height:100vh;}</style></head>
<body>
<main id="app"></main>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<script>
  (function () {
    function loadScript(candidates, attrs) {
      return new Promise(function (resolve, reject) {
        var i = 0;
        function next() {
          if (i >= candidates.length) return reject(new Error("Failed to load script: " + candidates.join(", ")));
          var s = document.createElement("script");
          if (attrs && attrs.type) s.type = attrs.type;
          s.src = candidates[i++];
          s.crossOrigin = "anonymous";
          s.onload = resolve;
          s.onerror = next;
          document.body.appendChild(s);
        }
        next();
      });
    }
    loadScript(["js/bago-env.js", "../js/bago-env.js"])
      .then(function () { return loadScript(["js/bago-api.js", "../js/bago-api.js"]); })
      .then(function () { return loadScript(["hf-prototype/components/shared.jsx", "../hf-prototype/components/shared.jsx"], { type: "text/babel" }); })
      .then(function () { return loadScript(["hf-prototype/components/shared-screens.jsx", "../hf-prototype/components/shared-screens.jsx"], { type: "text/babel" }); })
      .then(function () { return loadScript(["js/prototype-page-loader.js", "../js/prototype-page-loader.js"]); })
      .then(function () { window.BAGOPrototype.render("OTPScreen"); })
      .catch(function (e) {
        var app = document.getElementById("app");
        if (app) app.innerHTML = "<p style='color:#b00020'>Failed to load auth scripts. " + e.message + "</p>";
      });
  })();
</script>
</body></html>
