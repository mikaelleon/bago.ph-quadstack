<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <title>BAGO.PH - Login</title>
  <style>
    html, body { margin: 0; width: 100%; height: 100%; overflow-x: hidden; background: #f0f2f5; font-family: Poppins, sans-serif; }
    body { min-height: 100vh; }
    #app { width: 100%; min-height: 100vh; height: 100vh; overflow: hidden; }
  </style>
</head>
<body>
  <main id="app">
    <div style="max-width:560px;margin:60px auto;background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:24px;box-shadow:0 8px 24px rgba(0,0,0,.08);">
      <h1 style="margin:0 0 8px;font-family:Poppins,sans-serif;">BAGO.PH</h1>
      <p style="margin:0;color:#4b5563;font-family:Poppins,sans-serif;">Loading login screen...</p>
    </div>
  </main>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <script>
    (function () {
      function baseCandidates() {
        var path = String(window.location.pathname || "/");
        var out = ["./", "../", "/"];
        if (path.indexOf("/html/") === 0 || path === "/html") out.unshift("/html/");
        return out.filter(function (v, i, arr) { return arr.indexOf(v) === i; });
      }
      function withBases(relPath) {
        return baseCandidates().map(function (base) { return base + relPath; });
      }
      function ensureCoreLibs() {
        return new Promise(function (resolve, reject) {
          var attempts = 0;
          (function check() {
            if (window.React && window.ReactDOM && window.Babel) {
              resolve();
              return;
            }
            attempts += 1;
            if (attempts > 60) {
              reject(new Error("Core CDN scripts unavailable (React/ReactDOM/Babel). Check network or adblock/shields."));
              return;
            }
            setTimeout(check, 100);
          })();
        });
      }
      function hardFallback(reason) {
        var app = document.getElementById("app");
        if (!app) return;
        app.innerHTML =
          "<div style='max-width:560px;margin:60px auto;background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:24px;box-shadow:0 8px 24px rgba(0,0,0,.08);font-family:Poppins,sans-serif'>" +
          "<h1 style='margin:0 0 8px'>BAGO.PH Login</h1>" +
          "<p style='margin:0 0 14px;color:#4b5563'>UI scripts did not load. You can still navigate:</p>" +
          "<p style='margin:0 0 8px'><a href='register.html'>Register</a> · <a href='otp.html'>OTP</a></p>" +
          "<p style='margin:0;color:#b00020;font-size:12px'>" + String(reason || "Unknown load error") + "</p>" +
          "</div>";
      }
      function loadScript(candidates, attrs) {
        return new Promise(function (resolve, reject) {
          var i = 0;
          function next() {
            if (i >= candidates.length) return reject(new Error("Failed to load script: " + candidates.join(", ")));
            var s = document.createElement("script");
            if (attrs && attrs.type) s.type = attrs.type;
            s.src = candidates[i++];
            s.crossOrigin = "anonymous";
            s.onload = function () {
              resolve();
            };
            s.onerror = next;
            document.body.appendChild(s);
          }
          next();
        });
      }
      function loadText(candidates) {
        return new Promise(function (resolve, reject) {
          var i = 0;
          function next() {
            if (i >= candidates.length) return reject(new Error("Failed to fetch script: " + candidates.join(", ")));
            var url = candidates[i++];
            fetch(url)
              .then(function (res) {
                if (!res.ok) throw new Error(String(res.status));
                return res.text();
              })
              .then(function (code) { resolve({ code: code, url: url }); })
              .catch(next);
          }
          next();
        });
      }
      function loadBabelJsx(candidates) {
        return loadText(candidates).then(function (src) {
          if (!window.Babel || typeof window.Babel.transform !== "function") {
            throw new Error("Babel standalone unavailable");
          }
          var out = window.Babel.transform(src.code, { presets: ["react"] }).code;
          // Execute transformed JSX in global scope.
          (0, eval)(out + "\n//# sourceURL=" + src.url);
        });
      }
      ensureCoreLibs()
        .then(function () { return loadScript(withBases("js/bago-env.js")); })
        .then(function () { return loadScript(withBases("js/bago-api.js")); })
        .then(function () { return loadScript(withBases("js/i18n/strings.js")); })
        .then(function () { return loadScript(withBases("js/i18n/i18n.js")); })
        .then(function () { return loadBabelJsx(withBases("hf-prototype/components/shared.jsx")); })
        .then(function () { return loadBabelJsx(withBases("hf-prototype/components/shared-screens.jsx")); })
        .then(function () { return loadScript(withBases("js/prototype-page-loader.js")); })
        .then(function () {
          if (!window.BAGOPrototype || typeof window.BAGOPrototype.render !== "function") {
            throw new Error("Prototype loader unavailable");
          }
          window.BAGOPrototype.render("LoginScreen");
        })
        .catch(function (e) {
          hardFallback(e && e.message ? e.message : "Failed to load auth scripts");
        });
    })();
  </script>
</body>
</html>
