<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BAGO.PH - QR Audit</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f5f7fa; color: #1f2937; }
    .wrap { max-width: 760px; margin: 0 auto; padding: 24px; }
    .card { background: #fff; border-radius: 10px; padding: 16px; box-shadow: 0 8px 24px rgba(0,0,0,.06); }
    input, button { width: 100%; height: 38px; margin-top: 8px; border-radius: 6px; border: 1px solid #d1d5db; padding: 0 10px; }
    button { background: #0f766e; color: #fff; border: none; cursor: pointer; }
    pre { background: #111827; color: #e5e7eb; padding: 12px; border-radius: 8px; overflow: auto; }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="card">
      <h1>Collector QR Verification</h1>
      <form id="qr-scan-form">
        <label for="qr-token">QR Secure Token</label>
        <input id="qr-token" placeholder="BAGO-XXXXXX token" required />
        <button type="submit">Validate and Credit</button>
      </form>
      <pre id="qr-scan-result">No scan yet.</pre>
    </div>
  </main>
  <script src="js/bago-env.js"></script>
  <script src="js/bago-api.js"></script>
  <script src="js/collector-scan.js"></script>
  <script>
    window.BAGOCollectorScan.initCollectorScan();
  </script>
</body>
</html>
