<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BAGO.PH - Schedule</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f5f7fa; color: #1f2937; }
    .wrap { max-width: 1080px; margin: 0 auto; padding: 24px; }
    .card { background: #fff; border-radius: 10px; padding: 16px; box-shadow: 0 8px 24px rgba(0,0,0,.06); margin-bottom: 16px; }
    h1 { margin: 0 0 12px; font-size: 24px; }
    h2 { margin: 0 0 12px; font-size: 18px; }
    ul { list-style: none; margin: 0; padding: 0; display: grid; gap: 10px; }
    .schedule-item { border: 1px solid #e5e7eb; border-radius: 8px; padding: 10px; background: #fafafa; }
    .bago-banner-wrap { display: grid; gap: 8px; }
    .bago-banner-card { border-left: 4px solid #16a34a; background: #ecfdf5; padding: 10px; border-radius: 8px; display: grid; gap: 4px; }
    form { display: grid; grid-template-columns: repeat(3, minmax(150px, 1fr)); gap: 10px; }
    input, select, button { height: 36px; border-radius: 6px; border: 1px solid #d1d5db; padding: 0 10px; }
    button { cursor: pointer; background: #0f766e; color: #fff; border: 0; }
    input:focus-visible, select:focus-visible, button:focus-visible, a:focus-visible { outline: 3px solid #0f766e; outline-offset: 2px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 8px; border-bottom: 1px solid #e5e7eb; text-align: left; font-size: 14px; }
    .table-wrap { width: 100%; overflow-x: auto; }
    .muted { color: #6b7280; font-size: 12px; min-height: 16px; }
    #lgu-panel { display: none; }
    @media (max-width: 1024px) {
      .wrap { padding: 16px; }
      form { grid-template-columns: repeat(2, minmax(140px, 1fr)); }
    }
    @media (max-width: 768px) {
      form { grid-template-columns: 1fr; }
      input, select, button { width: 100%; }
    }
    @media (max-width: 360px) {
      .wrap { padding: 12px; }
      h1 { font-size: 20px; }
      h2 { font-size: 16px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Collection Schedule</h1>
    <section id="resident-panel" aria-labelledby="resident-schedule-heading">
      <div class="card">
        <h2 id="resident-schedule-heading">Recent Schedule Updates</h2>
        <div id="schedule-banner" role="region" aria-live="polite" aria-label="Schedule updates"></div>
      </div>
      <div class="card">
        <h2>Upcoming Collections</h2>
        <div id="resident-schedule-state" role="status" aria-live="polite"></div>
        <ul id="resident-schedule-list" aria-live="polite"></ul>
      </div>
    </section>

    <section id="lgu-panel" aria-labelledby="lgu-schedule-heading">
      <div class="card">
        <h2 id="lgu-schedule-heading">Create Schedule</h2>
        <form id="lgu-schedule-form">
          <label for="lgu-barangay">Barangay</label>
          <select id="lgu-barangay" required aria-describedby="lgu-barangay-error"></select>
          <div id="lgu-barangay-error" class="muted" aria-live="polite"></div>
          <label for="lgu-waste">Waste type</label>
          <select id="lgu-waste" required aria-describedby="lgu-waste-error">
            <option>Biodegradable</option>
            <option>Non-Biodegradable</option>
            <option>Recyclable</option>
            <option>Residual</option>
          </select>
          <div id="lgu-waste-error" class="muted" aria-live="polite"></div>
          <label for="lgu-date">Collection date</label>
          <input id="lgu-date" type="date" required aria-describedby="lgu-date-error" />
          <div id="lgu-date-error" class="muted" aria-live="polite"></div>
          <label for="lgu-start">Start time</label>
          <input id="lgu-start" type="time" value="07:00" required aria-describedby="lgu-start-error" />
          <div id="lgu-start-error" class="muted" aria-live="polite"></div>
          <label for="lgu-end">End time</label>
          <input id="lgu-end" type="time" value="09:00" required aria-describedby="lgu-end-error" />
          <div id="lgu-end-error" class="muted" aria-live="polite"></div>
          <label for="lgu-status">Status</label>
          <select id="lgu-status" required aria-describedby="lgu-status-error">
            <option>Scheduled</option>
            <option>Updated</option>
            <option>Cancelled</option>
          </select>
          <div id="lgu-status-error" class="muted" aria-live="polite"></div>
          <button id="lgu-schedule-submit-btn" type="submit">Save Schedule</button>
        </form>
      </div>
      <div class="card">
        <h2>Manage Schedules</h2>
        <div id="lgu-schedule-state" role="status" aria-live="polite"></div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>Barangay</th><th>Waste</th><th>Date</th><th>Time</th><th>Status</th><th>Actions</th></tr>
            </thead>
            <tbody id="lgu-schedule-tbody"></tbody>
          </table>
        </div>
      </div>
    </section>
  </main>
  <script src="js/bago-env.js"></script>
  <script src="js/bago-api.js"></script>
  <script src="role-access.js"></script>
  <script src="js/components/xml-editor-modal.js"></script>
  <script src="js/components/in-app-banner.js"></script>
  <script src="js/schedule-resident.js"></script>
  <script src="js/schedule-lgu.js"></script>
  <script>
    (async function () {
      var role = localStorage.getItem("bagoRole") || "user";
      var residentPanel = document.getElementById("resident-panel");
      var lguPanel = document.getElementById("lgu-panel");
      if (role === "lgu_officer") {
        residentPanel.style.display = "none";
        lguPanel.style.display = "block";
        await window.BAGOScheduleLGU.initLguSchedule();
      } else {
        residentPanel.style.display = "block";
        lguPanel.style.display = "none";
        await window.BAGOScheduleResident.initResidentSchedule();
      }
    })();
  </script>
</body>
</html>
