<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BAGO.PH - Eco Points</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f5f7fa; color: #1f2937; }
    .wrap { max-width: 980px; margin: 0 auto; padding: 24px; }
    .card { background: #fff; border-radius: 10px; padding: 16px; box-shadow: 0 8px 24px rgba(0,0,0,.06); margin-bottom: 16px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border-bottom: 1px solid #e5e7eb; padding: 8px; text-align: left; font-size: 14px; }
    button { height: 34px; border-radius: 6px; border: none; background: #0f766e; color: #fff; cursor: pointer; padding: 0 10px; }
    button:focus-visible, a:focus-visible { outline: 3px solid #0f766e; outline-offset: 2px; }
    .table-wrap { width: 100%; overflow-x: auto; }
    @media (max-width: 1024px) {
      .wrap { padding: 16px; }
    }
    @media (max-width: 768px) {
      th, td { white-space: nowrap; }
    }
    @media (max-width: 360px) {
      .wrap { padding: 12px; }
      h1 { font-size: 20px; }
      h2 { font-size: 16px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card" aria-labelledby="wallet-heading">
      <h1 id="wallet-heading">Eco-Points Wallet</h1>
      <div id="wallet-summary" role="status" aria-live="polite">Loading wallet...</div>
    </section>
    <section class="card" aria-labelledby="catalog-heading">
      <h2 id="catalog-heading">Redemption Catalog</h2>
      <div class="table-wrap">
        <table aria-label="Rewards catalog">
          <thead><tr><th>Reward</th><th>Partner</th><th>Cost</th><th>Action</th></tr></thead>
          <tbody id="reward-catalog-body"></tbody>
        </table>
      </div>
      <div id="redeem-status" role="status" aria-live="polite"></div>
    </section>
    <section class="card" aria-labelledby="ledger-heading">
      <h2 id="ledger-heading">Ledger</h2>
      <div class="table-wrap">
        <table aria-label="Eco-points ledger">
          <thead><tr><th>Date</th><th>Source</th><th>Delta</th><th>Notes</th></tr></thead>
          <tbody id="ledger-body"></tbody>
        </table>
      </div>
    </section>
  </main>
  <script src="js/bago-env.js"></script>
  <script src="js/bago-api.js"></script>
  <script src="js/components/toast.js"></script>
  <script src="js/components/error-banner.js"></script>
  <script src="js/eco-wallet.js"></script>
  <script>
    window.BAGOEcoWallet.initEcoWallet();
  </script>
</body>
</html>
