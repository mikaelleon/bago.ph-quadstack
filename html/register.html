<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BAGO.PH - Register</title>
  <style>body { margin: 0; min-height: 100vh; background: #f0f2f5; font-family: Poppins, sans-serif; } #app{width:100vw;min-height:100vh;}</style>
</head>
<body>
  <main id="app"></main>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <script>
    (function () {
      function baseCandidates() {
        var path = String(window.location.pathname || "/");
        var out = ["./", "../", "/"];
        if (path.indexOf("/html/") === 0 || path === "/html") out.unshift("/html/");
        return out.filter(function (v, i, arr) { return arr.indexOf(v) === i; });
      }
      function withBases(relPath) {
        return baseCandidates().map(function (base) { return base + relPath; });
      }
      function ensureCoreLibs() {
        return new Promise(function (resolve, reject) {
          var attempts = 0;
          (function check() {
            if (window.React && window.ReactDOM && window.Babel) {
              resolve();
              return;
            }
            attempts += 1;
            if (attempts > 60) {
              reject(new Error("Core CDN scripts unavailable (React/ReactDOM/Babel). Check network or adblock/shields."));
              return;
            }
            setTimeout(check, 100);
          })();
        });
      }
      function loadScript(candidates, attrs) {
        return new Promise(function (resolve, reject) {
          var i = 0;
          function next() {
            if (i >= candidates.length) return reject(new Error("Failed to load script: " + candidates.join(", ")));
            var s = document.createElement("script");
            if (attrs && attrs.type) s.type = attrs.type;
            s.src = candidates[i++];
            s.crossOrigin = "anonymous";
            s.onload = resolve;
            s.onerror = next;
            document.body.appendChild(s);
          }
          next();
        });
      }
      ensureCoreLibs()
        .then(function () { return loadScript(withBases("js/bago-env.js")); })
        .then(function () { return loadScript(withBases("js/bago-api.js")); })
        .then(function () { return loadScript(withBases("hf-prototype/components/shared.jsx"), { type: "text/babel" }); })
        .then(function () { return loadScript(withBases("hf-prototype/components/shared-screens.jsx"), { type: "text/babel" }); })
        .then(function () { return loadScript(withBases("js/prototype-page-loader.js")); })
        .then(function () { window.BAGOPrototype.render("RegisterScreen"); })
        .catch(function (e) {
          var app = document.getElementById("app");
          if (app) app.innerHTML = "<p style='color:#b00020'>Failed to load auth scripts. " + e.message + "</p>";
        });
    })();
  </script>
</body>
</html>
