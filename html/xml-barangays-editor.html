<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BAGO.PH - XML Barangays Editor</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f3f4f6; color: #111827; }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 16px; }
    .card { background: #fff; border-radius: 10px; padding: 12px; margin-bottom: 12px; box-shadow: 0 6px 18px rgba(0,0,0,.06); }
    .row { display: flex; gap: 8px; flex-wrap: wrap; }
    input, select, button { height: 34px; border: 1px solid #d1d5db; border-radius: 6px; padding: 0 8px; font: inherit; }
    button { cursor: pointer; background: #0f766e; border: 0; color: #fff; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { border-bottom: 1px solid #e5e7eb; padding: 6px; text-align: left; }
    th.sortable { cursor: pointer; }
    #view-mode-banner { display: none; color: #b45309; font-weight: 600; margin-bottom: 8px; }
  </style>
</head>
<body>
  <main class="wrap">
    <div id="view-mode-banner">View mode active (`?mode=view`). Edit controls disabled.</div>
    <div class="card row">
      <input id="hdr-city" placeholder="City" />
      <input id="hdr-province" placeholder="Province" />
      <input id="hdr-updated" placeholder="Last updated" />
      <input id="meta-source" placeholder="Source" />
      <input id="meta-note" placeholder="Note" />
    </div>
    <div class="card row">
      <button id="btn-save-browser">Save Browser Copy</button>
      <button id="btn-export">Export XML</button>
      <button id="btn-xsl-preview">XSL Preview</button>
      <button id="btn-reload-file">Reload File</button>
      <button id="btn-clear-storage">Clear Browser Copy</button>
      <button id="btn-add" class="xml-crud-only">Add Row</button>
      <span id="save-status"></span>
    </div>
    <div class="card">
      <div class="row">
        <input id="filter-barangay-q" placeholder="Search barangays" />
        <select id="filter-status">
          <option value="">All Status</option>
          <option value="On Track">On Track</option>
          <option value="Monitor">Monitor</option>
          <option value="Urgent">Urgent</option>
        </select>
      </div>
      <table>
        <thead><tr>
          <th class="sortable" data-col="0" data-label="Barangay">Barangay</th>
          <th class="sortable" data-col="1" data-label="Collection">Collection</th>
          <th class="sortable" data-col="2" data-label="Compliance">Compliance</th>
          <th class="sortable" data-col="3" data-label="Open Reports">Open Reports</th>
          <th class="sortable" data-col="4" data-label="Eco Points">Eco Points</th>
          <th class="sortable" data-col="5" data-label="Status">Status</th>
          <th>Actions</th>
        </tr></thead>
        <tbody id="tbody-barangays"></tbody>
      </table>
    </div>
  </main>
  <script type="application/xml" id="barangays-xml-fallback"><bago_barangays city="Lipa City" province="Batangas" last_updated="2026-04-14"><meta><source>BAGO.PH</source><note/></meta></bago_barangays></script>
  <script src="js/bago-env.js"></script>
  <script src="js/bago-api.js"></script>
  <script src="js/navigation-runtime.js"></script>
  <script src="js/i18n/strings.js"></script>
  <script src="js/i18n/i18n.js"></script>
  <script src="js/xml-data-core.js"></script>
  <script src="js/components/xml-editor-modal.js"></script>
  <script src="js/xml-editor-validators.js"></script>
  <script src="js/xml-barangays-app.js"></script>
</body>
</html>
